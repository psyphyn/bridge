version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      BRIDGE_API_LISTEN: "0.0.0.0:8080"
      BRIDGE_RELAY_ENDPOINT: "relay:51820"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    ports:
      - "51820:51820/udp"
      - "8081:8081"
    environment:
      RUST_LOG: info
      BRIDGE_WG_LISTEN: "0.0.0.0:51820"
      BRIDGE_HEALTH_LISTEN: "0.0.0.0:8081"
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
