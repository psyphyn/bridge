// Control plane protocol - communication between client and control plane API.

syntax = "proto3";
package bridge.control;

import "google/protobuf/timestamp.proto";

// Device registration request sent during initial enrollment.
message DeviceRegistration {
  string device_public_key = 1;
  string platform = 2;
  string os_version = 3;
  string hardware_model = 4;
  bytes attestation = 5;
}

message DeviceRegistrationResponse {
  string device_id = 1;
  bytes device_certificate = 2;
  string control_plane_url = 3;
}

// Posture report sent periodically by the client.
message PostureReport {
  string device_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  uint32 os_patch_age_days = 3;
  bool disk_encrypted = 4;
  bool firewall_enabled = 5;
  bool screen_lock_enabled = 6;
  repeated OsqueryResult osquery_results = 7;
}

message OsqueryResult {
  string query_name = 1;
  bool passed = 2;
  string raw_json = 3;
}

// Policy assignment pushed from control plane to client.
message PolicyAssignment {
  string policy_id = 1;
  string access_tier = 2;
  repeated TunnelAssignment tunnels = 3;
}

message TunnelAssignment {
  string tunnel_id = 1;
  string peer_public_key = 2;
  string peer_endpoint = 3;
  repeated string allowed_ips = 4;
  repeated string allowed_apps = 5;
}

service ControlPlane {
  rpc RegisterDevice(DeviceRegistration) returns (DeviceRegistrationResponse);
  rpc ReportPosture(PostureReport) returns (PolicyAssignment);
}
