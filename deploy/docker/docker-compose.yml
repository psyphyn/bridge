version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      BRIDGE_API_LISTEN: "0.0.0.0:8080"
      BRIDGE_RELAY_ENDPOINT: "relay:51820"
      RUST_LOG: "info"

  relay:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.relay
    ports:
      - "51820:51820/udp"
    environment:
      BRIDGE_RELAY_LISTEN: "0.0.0.0:51820"
      BRIDGE_API_URL: "http://api:8080"
      RUST_LOG: "info"
    depends_on:
      - api

  dashboard:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      - api
